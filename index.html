<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Uppgiftshanteraren</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23c2410c'/><path d='M25 52 l18 18 l32 -38' stroke='white' stroke-width='12' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>" />
</head>
<body>

  <!-- ===================== INLOGGNING ===================== -->
  <div id="login-screen" class="login-screen hidden">
    <div class="login-card">
      <div class="login-logo">✓</div>
      <h1>Uppgiftshanteraren</h1>
      <p>Logga in för att komma åt dina uppgifter från alla dina enheter.</p>
      <button id="btn-google" class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3C33.7 32.7 29.2 36 24 36c-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 13 4 4 13 4 24s9 20 20 20 20-9 20-20c0-1.3-.1-2.6-.4-3.9z"/><path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.9 1.2 8 3l5.7-5.7C34.3 6.1 29.4 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/><path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2C29.2 35.1 26.7 36 24 36c-5.2 0-9.6-3.3-11.3-8l-6.5 5C9.5 39.6 16.2 44 24 44z"/><path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.2-4.1 5.6l6.2 5.2C41 35.2 44 30 44 24c0-1.3-.1-2.6-.4-3.9z"/></svg>
        Logga in med Google
      </button>
      <p id="login-error" class="login-error hidden"></p>
    </div>
  </div>

  <!-- ===================== APP ===================== -->
  <div id="app" class="app hidden">
    <header class="topbar">
      <div class="topbar-left">
        <span class="app-mark">✓</span>
        <span class="app-title">Uppgiftshanteraren</span>
      </div>
      <nav class="tabs" id="tabs">
        <button class="tab active" data-view="board">Mina uppgifter</button>
        <button class="tab" data-view="today">Idag</button>
        <button class="tab" data-view="upcoming">Kommande</button>
        <button class="tab" data-view="archive">Arkiv</button>
      </nav>
      <div class="topbar-right">
        <input id="search" class="search" type="search" placeholder="Sök…" autocomplete="off" />
        <div class="usermenu">
          <button id="btn-user" class="btn-icon" title="Konto och inställningar">⋮</button>
          <div id="user-dropdown" class="dropdown hidden">
            <div class="dropdown-label" id="user-email"></div>
            <button class="dropdown-item" id="btn-import">Importera från Manus-export…</button>
            <button class="dropdown-item" id="btn-export">Exportera all data (JSON)</button>
            <hr />
            <button class="dropdown-item" id="btn-logout">Logga ut</button>
          </div>
        </div>
      </div>
    </header>

    <main id="main">
      <section id="view-board" class="view board"></section>
      <section id="view-today" class="view list-view hidden"></section>
      <section id="view-upcoming" class="view list-view hidden"></section>
      <section id="view-archive" class="view list-view hidden"></section>
    </main>
  </div>

  <!-- ===================== DIALOGER ===================== -->

  <dialog id="dlg-task" class="dlg">
    <form method="dialog" class="dlg-body" id="task-form">
      <h2 id="task-dlg-title">Uppgift</h2>
      <label>Rubrik
        <input type="text" id="task-title" required />
      </label>
      <label>Anteckningar
        <textarea id="task-notes" rows="3"></textarea>
      </label>
      <div class="dlg-row">
        <label>Status
          <select id="task-status">
            <option value="pending">Ej påbörjad</option>
            <option value="in_progress">Pågående</option>
            <option value="completed">Klar</option>
          </select>
        </label>
        <label>Deadline
          <input type="date" id="task-deadline" />
        </label>
        <label>Visas från (schemalagd)
          <input type="date" id="task-scheduled" />
        </label>
      </div>
      <div class="dlg-actions">
        <button type="button" class="btn btn-danger-ghost" id="task-delete">Ta bort</button>
        <button type="button" class="btn btn-ghost" id="task-archive">Arkivera</button>
        <span class="spacer"></span>
        <button type="button" class="btn btn-ghost" id="task-cancel">Avbryt</button>
        <button type="submit" class="btn btn-primary" id="task-save">Spara</button>
      </div>
    </form>
  </dialog>

  <dialog id="dlg-event" class="dlg">
    <form method="dialog" class="dlg-body" id="event-form">
      <h2 id="event-dlg-title">Händelse</h2>
      <label>Rubrik
        <input type="text" id="event-title" required />
      </label>
      <label>Datum
        <input type="date" id="event-date" required />
      </label>
      <div class="dlg-actions">
        <button type="button" class="btn btn-danger-ghost" id="event-delete">Ta bort</button>
        <span class="spacer"></span>
        <button type="button" class="btn btn-ghost" id="event-cancel">Avbryt</button>
        <button type="submit" class="btn btn-primary">Spara</button>
      </div>
    </form>
  </dialog>

  <dialog id="dlg-notes" class="dlg">
    <form method="dialog" class="dlg-body" id="notes-form">
      <h2>Beskrivning</h2>
      <label>Beskrivning (syns på kortet)
        <textarea id="proj-desc" rows="4"></textarea>
      </label>
      <div class="dlg-actions">
        <span class="spacer"></span>
        <button type="button" class="btn btn-ghost" id="notes-cancel">Avbryt</button>
        <button type="submit" class="btn btn-primary">Spara</button>
      </div>
    </form>
  </dialog>

  <dialog id="dlg-import" class="dlg">
    <div class="dlg-body">
      <h2>Importera från Manus-export</h2>
      <p class="muted">Välj filen <code>uppgiftshanteraren-export.json</code>. Innehållet läggs till dina nuvarande data – inget raderas.</p>
      <input type="file" id="import-file" accept=".json,application/json" />
      <p id="import-status" class="muted"></p>
      <div class="dlg-actions">
        <span class="spacer"></span>
        <button type="button" class="btn btn-ghost" id="import-cancel">Stäng</button>
        <button type="button" class="btn btn-primary" id="import-run" disabled>Importera</button>
      </div>
    </div>
  </dialog>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
